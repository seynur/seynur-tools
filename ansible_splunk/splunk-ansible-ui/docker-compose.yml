services:
  backend:
    build: ./backend
    restart: always
    working_dir: /app
    env_file:
      - .env
    environment:
      DEPLOYMENT_ROOT: /deployment
      SPLUNKAPPS_PATH: /deployment/apps
      # - GIT_AUTHOR_NAME=Splunk Ops
      # - GIT_AUTHOR_EMAIL=ops@example.com
    volumes:
      - ${DEPLOYMENT_ROOT}:/deployment:ro
      - backend-data:/app/data
      # Uncomment to mount SSH keys for Ansible:
      # - ~/.ssh:/root/.ssh:ro

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend-data:
