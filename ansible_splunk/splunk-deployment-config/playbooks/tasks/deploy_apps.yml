---
- name: Refuse apps listed for both deploy and removal
  ansible.builtin.assert:
    that: _conflicts | length == 0
    fail_msg: >-
      These apps appear in both apps and splunk_apps_to_remove: {{ _conflicts | join(', ') }}.
      Remove them from one list.
  vars:
    _deploy_names: "{{ apps | default([]) | map(attribute='name') | list }}"
    _remove_names: "{{ splunk_apps_to_remove | default([]) | map(attribute='name') | list }}"
    _conflicts: "{{ _deploy_names | intersect(_remove_names) }}"

- name: Remove apps marked for removal from Splunk destination
  ansible.builtin.file:
    path: "{{ splunk_dest }}/{{ item.name }}/"
    state: absent
  loop: "{{ splunk_apps_to_remove | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  become: true
  become_user: "{{ deploy_become_user }}"
  when: splunk_apps_to_remove | default([]) | length > 0

- name: Reset app staging directory on controller
  ansible.builtin.file:
    path: "{{ app_staging_dir }}"
    state: absent
  delegate_to: 127.0.0.1

- name: Create app staging directory on controller
  ansible.builtin.file:
    path: "{{ app_staging_dir }}/staged"
    state: directory
    mode: "0755"
  delegate_to: 127.0.0.1

- name: Stage apps from monorepo on controller
  ansible.builtin.copy:
    src: "{{ git_splunkapps_path }}/{{ item.name }}/"
    dest: "{{ app_staging_dir }}/staged/{{ item.name }}/"
    mode: preserve
  loop: "{{ apps }}"
  delegate_to: 127.0.0.1

- name: Ensure rsync is installed on target host
  ansible.builtin.package:
    name: rsync
    state: present
  become: true
  when: ansible_connection != 'community.docker.docker'

- name: Synchronize apps to Splunk destination
  ansible.posix.synchronize:
    src: "{{ app_staging_dir }}/staged/{{ item.name }}/"
    dest: "{{ splunk_dest }}/{{ item.name }}/"
    delete: true
    recursive: true
    rsync_opts:
      - "--archive"
      - "--exclude=.git"
  loop: "{{ apps }}"
  become: true
  become_user: "{{ deploy_become_user }}"
  when: ansible_connection != 'community.docker.docker'

- name: Copy apps to Splunk destination (docker connection)
  ansible.builtin.copy:
    src: "{{ app_staging_dir }}/staged/{{ item.name }}/"
    dest: "{{ splunk_dest }}/{{ item.name }}/"
    mode: preserve
  loop: "{{ apps }}"
  become: true
  become_user: "{{ deploy_become_user }}"
  when: ansible_connection == 'community.docker.docker'
